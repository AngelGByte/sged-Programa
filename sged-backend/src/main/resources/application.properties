# SGED Backend - Sistema Integral de Gestión Académica y Bienestar Estudiantil
spring.application.name=sged-backend

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sged_db
spring.datasource.username=root
spring.datasource.password=system
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=tu-clave-secreta-super-segura-aqui-cambiar-en-produccion-1234567890123456
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.cl.duocuc.sged=DEBUG
